name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution — it helps us find the right design.
      placeholder: When I ask Kortny to ..., I can't ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Slack experience
        - Agent / task execution
        - Sandbox / code execution
        - Integrations (Composio / MCP)
        - Memory / knowledge graph
        - Scheduling / proactivity
        - Dashboard / observability
        - Deployment / self-hosting
        - Other
