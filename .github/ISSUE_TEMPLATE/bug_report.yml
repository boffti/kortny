name: Bug report
description: Something isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please redact all tokens, workspace names, and real Slack content before submitting.
        **Security issues:** do NOT file them here — use [private vulnerability reporting](../security) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: Asked Kortny to ... and it ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the stack with `docker compose up -d`
        2. Mention the bot with "..."
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Worker/app logs, task timeline from the dashboard, or stack traces. Redact secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: main @ abc1234
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose (default)
        - Docker Compose + Temporal profile
        - Local dev (uv run)
        - Other
    validations:
      required: true
  - type: input
    id: llm
    attributes:
      label: LLM provider / model
      placeholder: openrouter / gpt-4o
